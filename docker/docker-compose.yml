version: '3.8'

services:
  web:
    build: ./web
    ports:
      - "8080:80"
    volumes:
      - ../src/app:/var/www/html
      - analysis_output:/var/www/html/analysis_output
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ../src/app/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  analysis:
    build:
      context: ..
      dockerfile: docker/analysis/Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - ../src/analysis:/app
      - ../notebooks:/notebooks
      - ../data:/data
      - analysis_output:/app/output
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      CWA_API_KEY: ${CWA_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

volumes:
  db_data:
  analysis_output:

networks:
  app_network:
    driver: bridge
